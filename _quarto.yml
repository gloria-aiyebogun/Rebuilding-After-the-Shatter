project:
  type: book

book:
  title: "Rebuilding after the Shatter"
  author: "Gloria Aiyebogun"
  date: "2026-04-01"
  chapters:
    - index.qmd
    - intro.qmd
    - chapter1.qmd
    - chapter2.qmd
    - chapter3.qmd
    - chapter4.qmd
    - chapter5.qmd
    - chapter6.qmd
    - chapter7.qmd
    - chapter8.qmd
    - about.qmd
    - references.qmd

format:
  # ----------------------------------
  # KINDLE EBOOK DESIGN (EPUB)
  # ----------------------------------
  epub:
    cover-image: Cover.png
    toc: true
    number-sections: false

  # ----------------------------------
  # PAPERBACK DESIGN (PDF)
  # ----------------------------------
  pdf:
    documentclass: book
    toc: true
    number-sections: false
    mainfont: "Times New Roman"
    fontsize: 11pt
    geometry:
      - paperwidth=6in
      - paperheight=9in
      - inner=0.875in
      - outer=0.5in
      - top=0.75in
      - bottom=0.75in